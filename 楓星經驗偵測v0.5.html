<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楓星 EXP 效率分析（台服）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0e0f13;
    --bg2: #161820;
    --bg3: #1e2028;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555870;
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --amber: #f6a623;
    --amber-dim: rgba(246,166,35,0.12);
    --red: #f06060;
    --red-dim: rgba(240,96,96,0.1);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 42px; height: 42px;
    background: var(--green-dim);
    border: 1px solid rgba(62,207,142,0.3);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-text p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    font-size: 12px; color: var(--text2);
    font-family: var(--mono);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Grid layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media(max-width:600px){ .main-grid{ grid-template-columns: 1fr; } }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* ── Capture card ── */
  .capture-card { grid-column: 1 / -1; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  button {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.primary {
    background: var(--green-dim);
    border-color: rgba(62,207,142,0.4);
    color: var(--green);
    font-weight: 500;
  }
  button.primary:hover { background: rgba(62,207,142,0.2); }
  button.danger {
    background: var(--red-dim);
    border-color: rgba(240,96,96,0.3);
    color: var(--red);
  }

  .preview-wrap { display: none; margin-top: 12px; }
  #previewCanvas {
    width: 100%; max-height: 72px; object-fit: contain;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: block;
  }
  .ocr-line {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    min-height: 16px;
  }

  .manual-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .manual-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  input[type=number] {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    width: 130px;
    outline: none;
  }
  input[type=number]:focus { border-color: rgba(62,207,142,0.5); }
  input::placeholder { color: var(--text3); }

  /* ── Timer card ── */
  .timer-big {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .timer-sub { font-size: 12px; color: var(--text3); }

  /* ── Stat rows ── */
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text2); }
  .stat-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-val.green { color: var(--green); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.blue  { color: var(--blue);  }
  .stat-val.purple{ color: var(--purple);}

  /* ── ETA card ── */
  .eta-highlight {
    background: var(--green-dim);
    border: 1px solid rgba(62,207,142,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .eta-highlight .eta-label { font-size: 11px; color: rgba(62,207,142,0.7); text-transform: uppercase; letter-spacing: 0.06em; }
  .eta-highlight .eta-big { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--green); }
  .no-data { font-size: 12px; color: var(--text3); font-style: italic; }

  /* ── Progress bar ── */
  .pct-bar-wrap { margin-top: 12px; }
  .pct-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .pct-bar-track {
    height: 6px; border-radius: 99px;
    background: var(--bg3);
    overflow: hidden;
  }
  .pct-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green), #7effc9);
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Log ── */
  .log-card { grid-column: 1 / -1; }
  .log-scroll { max-height: 280px; overflow-y: auto; }
  .log-scroll::-webkit-scrollbar { width: 4px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 0 10px 8px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg2);
  }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
    font-family: var(--mono); letter-spacing: 0.04em;
  }
  .badge.ocr  { background: var(--green-dim); color: var(--green); }
  .badge.manual { background: var(--amber-dim); color: var(--amber); }
  .diff-plus { color: var(--green); font-family: var(--mono); font-size: 12px; }
  td.mono { font-family: var(--mono); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">🍁</div>
    <div class="header-text">
      <h1>楓星 EXP 效率分析（台服）</h1>
      <p>MapleStory Worlds 台服 — 練功效率追蹤器（4/2 更新後 EXP 表）</p>
    </div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="statusText">尚未開始</span>
    </div>
  </div>

  <div class="main-grid">

    <!-- Capture -->
    <div class="card capture-card">
      <div class="card-title">畫面擷取 / 資料輸入</div>
      <div class="btn-row">
        <button class="primary" id="btnStart" onclick="startCapture()">▶ 開始擷取螢幕</button>
        <button id="btnPause" onclick="togglePause()" disabled>⏸ 暫停</button>
        <button id="btnPip" onclick="togglePip()" disabled>⧉ 懸浮視窗</button>
        <button class="danger" onclick="resetAll()">↺ 重置</button>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <canvas id="previewCanvas"></canvas>
        <div class="ocr-line" id="ocrLine">等待辨識...</div>
      </div>
      <div class="manual-row">
        <label>角色等級：</label>
        <input id="inputLevel" type="number" placeholder="等級（如 53）" style="width:110px" />
        <label style="margin-left:8px">手動輸入：</label>
        <input id="inExp" type="number" placeholder="EXP（如 86757）" />
        <input id="inPct" type="number" step="0.01" placeholder="% （如 62.03）" />
        <button onclick="manualAdd()">新增</button>
      </div>
    </div>

    <!-- Timer -->
    <div class="card">
      <div class="card-title">累積時間</div>
      <div class="timer-big" id="timerBig">00:00</div>
      <div class="timer-sub">時：分：秒</div>
      <div class="pct-bar-wrap">
        <div class="pct-bar-label">
          <span>升等進度</span>
          <span id="pctLabel">—</span>
        </div>
        <div class="pct-bar-track">
          <div class="pct-bar-fill" id="pctFill"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="card-title">EXP 統計</div>
      <div class="stat-row">
        <span class="stat-label">1分內</span>
        <span class="stat-val blue" id="s1m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">10分內</span>
        <span class="stat-val green" id="s10m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">60分內</span>
        <span class="stat-val amber" id="s60m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">全部累積</span>
        <span class="stat-val purple" id="sAll">0</span>
      </div>
    </div>

    <!-- ETA -->
    <div class="card">
      <div class="card-title">升等預估</div>
      <div id="etaArea"><div class="no-data">累積 2 筆以上資料後顯示</div></div>
    </div>

    <!-- Log -->
    <div class="card log-card">
      <div class="card-title">紀錄明細（最新 50 筆）</div>
      <div class="log-scroll">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>EXP</th>
              <th>進度 %</th>
              <th>+ EXP</th>
              <th>來源</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <tr><td colspan="5" class="no-data" style="padding:14px 10px">尚無紀錄</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
let stream = null, video = null, capInterval = null, timerInterval = null;
let startTs = null, records = [], running = false, paused = false;
let pipVideo = null, pipCanvas = null, pipCtx = null, pipInterval = null;

let pausedMs = 0, pauseStartTs = null;

function elapsed(){
  if(!startTs) return 0;
  const base = Date.now() - startTs - pausedMs;
  return Math.floor(base / 1000);
}

function togglePause(){
  paused = !paused;
  if(paused){
    pauseStartTs = Date.now();
    if(capInterval){ clearInterval(capInterval); capInterval = null; }
    if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
    $('btnPause').textContent = '▶ 繼續';
    $('dot').classList.remove('on');
    $('statusText').textContent = '已暫停';
  } else {
    if(pauseStartTs) pausedMs += Date.now() - pauseStartTs;
    pauseStartTs = null;
    capInterval = setInterval(doCapture, 1000);
    timerInterval = setInterval(tick, 1000);
    $('btnPause').textContent = '⏸ 暫停';
    $('dot').classList.add('on');
    $('statusText').textContent = '擷取中';
  }
}

async function togglePip(){
  if(document.pictureInPictureElement){
    await document.exitPictureInPicture();
    return;
  }
  if(!pipCanvas){
    pipCanvas = document.createElement('canvas');
    pipCanvas.width = 320; pipCanvas.height = 160;
    pipCtx = pipCanvas.getContext('2d');
  }
  drawPip();
  pipVideo = document.createElement('video');
  pipVideo.muted = true;
  pipVideo.srcObject = pipCanvas.captureStream(2);
  await pipVideo.play();
  await pipVideo.requestPictureInPicture();
  pipInterval = setInterval(drawPip, 500);
  pipVideo.addEventListener('leavepictureinpicture', () => {
    clearInterval(pipInterval);
  });
}

function drawPip(){
  if(!pipCtx) return;
  const W = 320, H = 160;
  pipCtx.fillStyle = '#0e0f13';
  pipCtx.fillRect(0, 0, W, H);

  const lv = $('inputLevel').value || '—';
  const last = records[records.length-1];
  const pct = last ? last.pct.toFixed(2) + '%' : '—';
  const gained = totalExpGained();
  const first = records[0];
  const elapsed = first && last ? (last.ts - first.ts) / 1000 : 0;
  const expPerSec = elapsed > 0 ? gained / elapsed : 0;
  const per10m = fmt(Math.round(expPerSec * 600));
  const lv_now = parseInt($('inputLevel').value) || 0;
  const totalExp = getExpForLevel(lv_now);
  let etaStr = '—';
  if(totalExp && last && expPerSec > 0){
    const remain = Math.round(totalExp * (100 - last.pct) / 100);
    etaStr = fmtETA(Math.round(remain / expPerSec));
  }

  pipCtx.textAlign = 'left';

  // Title
  pipCtx.fillStyle = '#3ecf8e';
  pipCtx.font = 'bold 13px monospace';
  pipCtx.fillText('🍁 楓星 EXP 追蹤', 16, 24);

  // Divider
  pipCtx.fillStyle = '#2a2c38';
  pipCtx.fillRect(16, 32, W - 32, 1);

  // Stats
  pipCtx.font = '13px monospace';
  const rows = [
    ['等級', `Lv. ${lv}`],
    ['進度', pct],
    ['10分累積', fmt(expInWindow(600000))],
    ['預估升等', etaStr],
  ];
  rows.forEach(([label, val], i) => {
    const y = 52 + i * 26;
    pipCtx.fillStyle = '#8b8fa8';
    pipCtx.fillText(label, 16, y);
    pipCtx.fillStyle = '#e8eaf0';
    pipCtx.textAlign = 'right';
    pipCtx.fillText(val, W - 16, y);
    pipCtx.textAlign = 'left';
  });
}

const $ = id => document.getElementById(id);

function fmt(n){ return Number(n).toLocaleString('zh-TW'); }
function fmtTime(s){
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if(h>0) return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}
function fmtETA(s){
  if(!isFinite(s)||s<=0) return '—';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0) return `${h} 時 ${m} 分`;
  return `${m} 分 ${Math.floor(s%60)} 秒`;
}

function tick(){
  $('timerBig').textContent = fmtTime(elapsed());
  updateStats();
}

function expInWindow(ms){
  const now = Date.now();
  const w = records.filter(r => now - r.ts <= ms && r.exp > 0 && r.pct > 0);
  return w.reduce((sum, r) => sum + r.diff, 0);
}

function totalExpGained(){
  return records.reduce((sum, r) => sum + r.diff, 0);
}

function updateStats(){
  $('s1m').textContent  = fmt(expInWindow(60000));
  $('s10m').textContent = fmt(expInWindow(600000));
  $('s60m').textContent = fmt(expInWindow(3600000));
  const all = totalExpGained();
  $('sAll').textContent = fmt(all);

  const last = records[records.length-1];
  if(last){
    $('pctLabel').textContent = last.pct.toFixed(2) + '%';
    $('pctFill').style.width = last.pct + '%';
  }
  updateETA();
}

function updateETA(){
  const last = records[records.length-1];
  if(!last){
    $('etaArea').innerHTML = '<div class="no-data">累積 2 筆以上資料後顯示</div>';
    return;
  }
  const lv = parseInt($('inputLevel').value) || 0;
  const totalExp = getExpForLevel(lv);
  const pct = last.pct;
  const pctRemain = 100 - pct;
  let html = '';

  const exp1m = expInWindow(60000);
  if(totalExp && pctRemain > 0){
    const expRemain = Math.round(totalExp * pctRemain / 100);
    html += `<div class="eta-highlight"><div class="eta-label">距離升等剩餘 EXP</div><div class="eta-big">${fmt(expRemain)}</div></div>`;
    if(exp1m > 0){
      const etaSec = Math.round((expRemain / exp1m) * 60);
      html += `<div class="stat-row"><span class="stat-label">預估升等時間</span><span class="stat-val green">${fmtETA(etaSec)}</span></div>`;
    }
  }
  html += `<div class="stat-row"><span class="stat-label">最近 1 分鐘</span><span class="stat-val blue">${fmt(exp1m)}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">最近 10 分鐘</span><span class="stat-val green">${fmt(expInWindow(600000))}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">最近 60 分鐘</span><span class="stat-val amber">${fmt(expInWindow(3600000))}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">目前進度</span><span class="stat-val">${pct.toFixed(2)}%</span></div>`;
  $('etaArea').innerHTML = html;
}

function addRecord(exp, pct, src){
  if(!startTs){
    startTs = Date.now();
    timerInterval = setInterval(tick, 1000);
  }
  const prev = records[records.length-1];
  let diff = 0;
  if(prev){
    const timeDiff = Date.now() - prev.ts;
    if(timeDiff > 60000){
      // 中斷超過 60 秒，diff 歸 0
      diff = 0;
    } else if(exp >= prev.exp){
      diff = exp - prev.exp;
      if(diff > 100000) return; // 異常大幅跳動，丟棄
    } else if(prev.exp - exp > 10000){
      // EXP 大幅下降（> 10,000）才視為升等
      // 用升等前的等級（即目前等級 - 1）計算剩餘 EXP
      const currentLv = parseInt($('inputLevel').value) || 1;
      const prevLvTotal = getExpForLevel(currentLv - 1);
      if(prevLvTotal && prev.pct < 100){
        const toMax = Math.round(prevLvTotal * (100 - prev.pct) / 100);
        diff = toMax + exp;
        if(diff > 500000) diff = exp; // 防止異常過大
      } else {
        diff = exp;
      }
    } else {
      // 小幅下降（像素誤差），不記錄這筆
      return;
    }
  }
  records.push({ ts: Date.now(), exp, pct, diff, src });
  updateLog();
  updateStats();
}

function updateLog(){
  if(!records.length){
    $('logBody').innerHTML = '<tr><td colspan="5" class="no-data" style="padding:14px 10px">尚無紀錄</td></tr>';
    return;
  }
  const rows = records.slice().reverse().slice(0,50).map(r=>{
    const d = new Date(r.ts);
    const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':');
    const diffStr = r.diff > 0 ? `<span class="diff-plus">+${fmt(r.diff)}</span>` : '—';
    const badge = r.src==='pixel' ? '<span class="badge ocr">像素</span>' : r.src==='ocr' ? '<span class="badge ocr">OCR</span>' : '<span class="badge manual">手動</span>';
    return `<tr>
      <td class="mono">${t}</td>
      <td class="mono">${fmt(r.exp)}</td>
      <td class="mono">${r.pct.toFixed(2)}%</td>
      <td>${diffStr}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
  $('logBody').innerHTML = rows;
}

function manualAdd(){
  const exp = parseInt($('inExp').value);
  const pct = parseFloat($('inPct').value);
  if(isNaN(exp)||isNaN(pct)) return;
  addRecord(exp, pct, 'manual');
  $('inExp').value = ''; $('inPct').value = '';
}

async function startCapture(){
  // 強制先填等級
  const lv = parseInt($('inputLevel').value) || 0;
  if(lv < 1){
    alert('請先輸入角色等級再開始擷取！');
    $('inputLevel').focus();
    return;
  }
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 2 }, audio: false });
    video = document.createElement('video');
    video.srcObject = stream;
    await video.play();
    running = true;
    paused = false;
    $('btnStart').disabled = true;
    $('btnPause').disabled = false;
    $('dot').classList.add('on');
    $('statusText').textContent = '擷取中';
    $('previewWrap').style.display = 'block';
    $('btnPip').disabled = false;
    capInterval = setInterval(doCapture, 1000);
    setTimeout(doCapture, 1200);
  } catch(e) {
    alert('無法擷取螢幕：' + e.message + '\n\n請確認使用 Chrome 瀏覽器，並允許畫面分享。');
  }
}

// 台服升等 EXP 表（4/2 更新後）
const EXP_TABLE = [0,15,34,57,92,135,372,560,840,1242,1350,1534,2090,2730,3549,4582,5746,7176,8915,10842,13140,15861,18837,22308,26332,35685,37186,41382,47502,54125,66990,75936,85932,97066,108878,121951,136382,151620,168385,186677,205951,226968,249841,273812,299796,327915,357294,388976,423091,458640,496801,524025,552741,583031,614981,648682,684229,721725,761275,802992,846932,893410,942369,994011,1048482,1105939,1166544,1230029,1297900,1369025,1547193,1631979,1721412,1815744,1915247,2020202,2130909,2247682,2370855,2500777,2638427,2782370,2934845,3095667,3265317,3444255,3633000,3832089,4042086,4263592,4497237,4743685,4963139,5277838,5567064,5872138,6193931,6533358,6891385,7215330,7667376,8087547,8530745,8998230,9491681,10011457,10560084,11138777,11749257,12393036,13072167,13788529,14544140,15341158,16181853,17068619,18003979,18990597,20031281,21128994,23772654,25075395,26449526,27898960,29427822,31040466,32741483,34535716,36428272,38424541,40530206,42751261,45094030,47565183,50171755,52921167,55821246,58880250,62106888,65510344,69100311,72887008,76881216,81094306,85538273,90225770,95170142,100385465,105886588,111689173,125172848,132032320,139267691,146899636,154949656,163440896,172397495,181844837,191809934,202321118,213408315,225103090,245938739,250450381,264175062,278651855,293921976,310020400,327018483,344939096,363841758,383780287,404811446,426995113,450394445,475076060,501101360,528571068,557536762,588089777,656806337,692799324,730764727,770810634,813051056,857606254,904603076,954175324,1006464132,1061618365,1119795051,1181159820,1245887378,1322262006,1386177633,1462140651,1542265949,1626782123,1715929778,1809962734];

function getExpForLevel(lv) {
  if(lv < 1 || lv >= EXP_TABLE.length) return null;
  return EXP_TABLE[lv];
}

let captureCount = 0;

async function doCapture(){
  if(!video || !running) return;
  captureCount++;
  const vw = video.videoWidth, vh = video.videoHeight;
  if(!vw || !vh) return;

  const offscreen = document.createElement('canvas');
  offscreen.width = vw; offscreen.height = vh;
  const octx = offscreen.getContext('2d');
  octx.drawImage(video, 0, 0, vw, vh);

  // ── 1. 讀取 EXP 進度條百分比（找綠色結尾位置）──
  // 整條軌道（含灰色空白）：x: 26.4%~56%, y: 97.9%~99.5%
  const trackX = Math.floor(vw * 0.264);
  const trackY = Math.floor(vh * 0.976);
  const trackW = Math.floor(vw * 0.285);
  const trackH = Math.floor(vh * 0.019);
  const barData = octx.getImageData(trackX, trackY, trackW, trackH);
  const bd = barData.data;

  // 逐列找最後一個綠色較多的欄位
  let lastGreenCol = -1;
  for(let x = 0; x < trackW; x++){
    let colGreen = 0;
    for(let y = 0; y < trackH; y++){
      const i = (y * trackW + x) * 4;
      const r = bd[i], g = bd[i+1], b = bd[i+2];
      if(g > 80 && g > r * 1.2 && g > b * 1.2) colGreen++;
    }
    if(colGreen > trackH * 0.3) lastGreenCol = x;
  }
  const pct = lastGreenCol >= 0
    ? Math.round((lastGreenCol / (trackW - 1)) * 10000) / 100
    : 0;

  // ── 2. 偵測等級（讀取黃色 LV 數字區域）──
  // LV 數字：x: 2.75%~11.34%, y: 96%~98.5%（黃色大字）
  const lvX = Math.floor(vw * 0.0275);
  const lvY = Math.floor(vh * 0.960);
  const lvW = Math.floor(vw * 0.086);
  const lvH = Math.floor(vh * 0.025);

  const lvCvs = document.createElement('canvas');
  lvCvs.width = lvW * 3; lvCvs.height = lvH * 3;
  const lvCtx = lvCvs.getContext('2d');
  lvCtx.imageSmoothingEnabled = true;
  lvCtx.drawImage(offscreen, lvX, lvY, lvW, lvH, 0, 0, lvW*3, lvH*3);

  // 把黃色字變白、其他變黑，提高 OCR 辨識率
  const lvImg = lvCtx.getImageData(0, 0, lvCvs.width, lvCvs.height);
  const ld = lvImg.data;
  for(let i = 0; i < ld.length; i += 4){
    const r = ld[i], g = ld[i+1], b = ld[i+2];
    const isYellow = r > 150 && g > 120 && b < 100;
    const val = isYellow ? 255 : 0;
    ld[i] = ld[i+1] = ld[i+2] = val; ld[i+3] = 255;
  }
  lvCtx.putImageData(lvImg, 0, 0);

  let detectedLv = parseInt($('inputLevel').value) || 0;
  if(captureCount % 120 === 1){  // 每 60 秒偵測一次等級
    try {
      const lvRes = await Tesseract.recognize(lvCvs, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '7',
      });
      const lvRaw = lvRes.data.text.replace(/\D/g, '').trim();
      const lvNum = parseInt(lvRaw);
      const currentLv = parseInt($('inputLevel').value) || 0;
      if(!isNaN(lvNum) && lvNum >= Math.max(10, currentLv) && lvNum <= 200){
        detectedLv = lvNum;
        $('inputLevel').value = lvNum;
      }
    } catch(e) {}
  }  // end level detection

  const lv = detectedLv;
  const totalExp = getExpForLevel(lv);

  // ── 進度條偵測：低進度改用從左邊算連續綠色欄 ──
  let finalPct = pct;
  if(pct < 15){
    // 只算從左邊開始連續的綠色欄，一旦出現空欄就停止
    let contiguousGreen = 0;
    for(let x = 0; x < trackW; x++){
      let colGreen = 0;
      for(let y = 0; y < trackH; y++){
        const i = (y * trackW + x) * 4;
        const r = bd[i], g = bd[i+1], b = bd[i+2];
        if(g > 80 && g > r * 1.2 && g > b * 1.2) colGreen++;
      }
      if(colGreen > trackH * 0.3){
        contiguousGreen = x + 1;
      } else if(contiguousGreen > 0){
        break; // 連續區結束就停
      }
    }
    if(contiguousGreen > 0){
      finalPct = Math.round((contiguousGreen / trackW) * 10000) / 100;
    }
  }

  let expVal = null;
  if(totalExp && finalPct >= 0 && finalPct <= 100){
    expVal = Math.round(totalExp * finalPct / 100);
  }

  // ── 3. 更新預覽 ──
  const cvs = $('previewCanvas');
  cvs.width = trackW; cvs.height = trackH * 5;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(offscreen, trackX, trackY, trackW, trackH, 0, 0, trackW, trackH * 5);

  if(expVal !== null){
    $('ocrLine').textContent = `偵測到：Lv.${lv} | 進度 ${finalPct}% | EXP ≈ ${fmt(expVal)}`;
    if(expVal <= 0 || finalPct <= 0) return;
    const prev = records[records.length-1];
    if(!prev || Math.abs(expVal - prev.exp) > 0 || finalPct !== prev.pct){
      addRecord(expVal, finalPct, 'pixel');
    }
  } else if(finalPct >= 0){
    $('ocrLine').textContent = `進度 ${finalPct}%（請在下方設定等級以計算 EXP）`;
  } else {
    $('ocrLine').textContent = '無法偵測進度條，請確認遊戲畫面';
  }
}

function stopCapture(){
  running = false;
  paused = false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  if(capInterval){ clearInterval(capInterval); capInterval = null; }
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  if(pipInterval){ clearInterval(pipInterval); pipInterval = null; }
  if(document.pictureInPictureElement) document.exitPictureInPicture();
  startTs = null;
  $('timerBig').textContent = '00:00';
  $('btnStart').disabled = false;
  $('btnPause').disabled = true;
  $('btnPause').textContent = '⏸ 暫停';
  $('btnPip').disabled = true;
  $('dot').classList.remove('on');
  $('statusText').textContent = '已停止';
}

function resetAll(){
  if(!confirm('確定要重置所有資料嗎？')) return;
  stopCapture();
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  records = []; startTs = null; pausedMs = 0; pauseStartTs = null;
  $('timerBig').textContent = '00:00';
  $('statusText').textContent = '尚未開始';
  $('pctLabel').textContent = '—';
  $('pctFill').style.width = '0%';
  $('previewWrap').style.display = 'none';
  $('ocrLine').textContent = '';
  updateLog(); updateStats();
}

// Enter key for manual input
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') manualAdd();
});
</script>
