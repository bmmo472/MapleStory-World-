<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楓星 EXP 效率分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0e0f13;
    --bg2: #161820;
    --bg3: #1e2028;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555870;
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --amber: #f6a623;
    --amber-dim: rgba(246,166,35,0.12);
    --red: #f06060;
    --red-dim: rgba(240,96,96,0.1);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 42px; height: 42px;
    background: var(--green-dim);
    border: 1px solid rgba(62,207,142,0.3);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-text p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    font-size: 12px; color: var(--text2);
    font-family: var(--mono);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Grid layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media(max-width:600px){ .main-grid{ grid-template-columns: 1fr; } }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* ── Capture card ── */
  .capture-card { grid-column: 1 / -1; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  button {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.primary {
    background: var(--green-dim);
    border-color: rgba(62,207,142,0.4);
    color: var(--green);
    font-weight: 500;
  }
  button.primary:hover { background: rgba(62,207,142,0.2); }
  button.danger {
    background: var(--red-dim);
    border-color: rgba(240,96,96,0.3);
    color: var(--red);
  }

  .preview-wrap { display: none; margin-top: 12px; }
  #previewCanvas {
    width: 100%; max-height: 72px; object-fit: contain;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: block;
  }
  .ocr-line {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    min-height: 16px;
  }

  .manual-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .manual-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  input[type=number] {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    width: 130px;
    outline: none;
  }
  input[type=number]:focus { border-color: rgba(62,207,142,0.5); }
  input::placeholder { color: var(--text3); }

  /* ── Timer card ── */
  .timer-big {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .timer-sub { font-size: 12px; color: var(--text3); }

  /* ── Stat rows ── */
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text2); }
  .stat-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-val.green { color: var(--green); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.blue  { color: var(--blue);  }
  .stat-val.purple{ color: var(--purple);}

  /* ── ETA card ── */
  .eta-highlight {
    background: var(--green-dim);
    border: 1px solid rgba(62,207,142,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .eta-highlight .eta-label { font-size: 11px; color: rgba(62,207,142,0.7); text-transform: uppercase; letter-spacing: 0.06em; }
  .eta-highlight .eta-big { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--green); }
  .no-data { font-size: 12px; color: var(--text3); font-style: italic; }

  /* ── Progress bar ── */
  .pct-bar-wrap { margin-top: 12px; }
  .pct-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .pct-bar-track {
    height: 6px; border-radius: 99px;
    background: var(--bg3);
    overflow: hidden;
  }
  .pct-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green), #7effc9);
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Log ── */
  .log-card { grid-column: 1 / -1; }
  .log-scroll { max-height: 280px; overflow-y: auto; }
  .log-scroll::-webkit-scrollbar { width: 4px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 0 10px 8px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg2);
  }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
    font-family: var(--mono); letter-spacing: 0.04em;
  }
  .badge.ocr  { background: var(--green-dim); color: var(--green); }
  .badge.manual { background: var(--amber-dim); color: var(--amber); }
  .diff-plus { color: var(--green); font-family: var(--mono); font-size: 12px; }
  td.mono { font-family: var(--mono); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">🍁</div>
    <div class="header-text">
      <h1>楓星 EXP 效率分析</h1>
      <p>MapleStory Worlds — 練功效率追蹤器</p>
    </div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="statusText">尚未開始</span>
    </div>
  </div>

  <div class="main-grid">

    <!-- Capture -->
    <div class="card capture-card">
      <div class="card-title">畫面擷取 / 資料輸入</div>
      <div class="btn-row">
        <button class="primary" id="btnStart" onclick="startCapture()">▶ 開始擷取螢幕</button>
        <button id="btnStop" onclick="stopCapture()" disabled>■ 停止</button>
        <button class="danger" onclick="resetAll()">↺ 重置</button>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <canvas id="previewCanvas"></canvas>
        <div class="ocr-line" id="ocrLine">等待辨識...</div>
      </div>
      <div class="manual-row">
        <label>角色等級：</label>
        <input id="inputLevel" type="number" placeholder="等級（如 53）" style="width:110px" />
        <label style="margin-left:8px">手動輸入：</label>
        <input id="inExp" type="number" placeholder="EXP（如 86757）" />
        <input id="inPct" type="number" step="0.01" placeholder="% （如 62.03）" />
        <button onclick="manualAdd()">新增</button>
      </div>
    </div>

    <!-- Timer -->
    <div class="card">
      <div class="card-title">累積時間</div>
      <div class="timer-big" id="timerBig">00:00</div>
      <div class="timer-sub">時：分：秒</div>
      <div class="pct-bar-wrap">
        <div class="pct-bar-label">
          <span>升等進度</span>
          <span id="pctLabel">—</span>
        </div>
        <div class="pct-bar-track">
          <div class="pct-bar-fill" id="pctFill"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="card-title">EXP 統計</div>
      <div class="stat-row">
        <span class="stat-label">1分內</span>
        <span class="stat-val blue" id="s1m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">10分內</span>
        <span class="stat-val green" id="s10m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">60分內</span>
        <span class="stat-val amber" id="s60m">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">全部累積</span>
        <span class="stat-val purple" id="sAll">0</span>
      </div>
    </div>

    <!-- ETA -->
    <div class="card">
      <div class="card-title">升等預估</div>
      <div id="etaArea"><div class="no-data">累積 2 筆以上資料後顯示</div></div>
    </div>

    <!-- Log -->
    <div class="card log-card">
      <div class="card-title">紀錄明細（最新 50 筆）</div>
      <div class="log-scroll">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>EXP</th>
              <th>進度 %</th>
              <th>+ EXP</th>
              <th>來源</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <tr><td colspan="5" class="no-data" style="padding:14px 10px">尚無紀錄</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
let stream = null, video = null, capInterval = null, timerInterval = null;
let startTs = null, records = [], running = false;

const $ = id => document.getElementById(id);

function fmt(n){ return Number(n).toLocaleString('zh-TW'); }
function fmtTime(s){
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if(h>0) return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}
function fmtETA(s){
  if(!isFinite(s)||s<=0) return '—';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0) return `${h} 時 ${m} 分`;
  return `${m} 分 ${Math.floor(s%60)} 秒`;
}
function elapsed(){ return startTs ? Math.floor((Date.now()-startTs)/1000) : 0; }

function tick(){
  $('timerBig').textContent = fmtTime(elapsed());
  updateStats();
}

function expInWindow(ms){
  const now = Date.now();
  // 用累積 diff，支援跨等級
  return records
    .filter(r => now - r.ts <= ms)
    .reduce((sum, r) => sum + r.diff, 0);
}

function totalExpGained(){
  return records.reduce((sum, r) => sum + r.diff, 0);
}

function updateStats(){
  $('s1m').textContent  = fmt(expInWindow(60000));
  $('s10m').textContent = fmt(expInWindow(600000));
  $('s60m').textContent = fmt(expInWindow(3600000));
  const all = totalExpGained();
  $('sAll').textContent = fmt(all);

  const last = records[records.length-1];
  if(last){
    const pct = last.pct;
    $('pctLabel').textContent = pct.toFixed(2) + '%';
    $('pctFill').style.width = pct + '%';
  }
  updateETA(all);
}

function updateETA(gained){
  if(records.length < 2 || gained <= 0){
    $('etaArea').innerHTML = '<div class="no-data">累積 2 筆以上資料後顯示</div>';
    return;
  }
  const first = records[0], last = records[records.length-1];
  const secElapsed = (last.ts - first.ts) / 1000;
  if(secElapsed <= 0) return;
  const expPerSec = gained / secElapsed;
  const last_lv = parseInt($('inputLevel').value) || 0;
  const totalExp = getExpForLevel(last_lv);
  const pctRemain = 100 - last.pct;
  let html = '';
  if(totalExp && pctRemain > 0 && expPerSec > 0){
    const expNeeded = Math.round(totalExp * pctRemain / 100);
    const etaSec = Math.round(expNeeded / expPerSec);
    html += `<div class="eta-highlight"><div class="eta-label">距離升等</div><div class="eta-big">${fmtETA(etaSec)}</div></div>`;
  }
  html += `<div class="stat-row"><span class="stat-label">EXP / 10分</span><span class="stat-val green">${fmt(Math.round(expPerSec*600))}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">EXP / 小時</span><span class="stat-val amber">${fmt(Math.round(expPerSec*3600))}</span></div>`;
  html += `<div class="stat-row"><span class="stat-label">目前進度</span><span class="stat-val">${last.pct.toFixed(2)}%</span></div>`;
  $('etaArea').innerHTML = html;
}

function addRecord(exp, pct, src){
  if(!startTs){
    startTs = Date.now();
    timerInterval = setInterval(tick, 1000);
  }
  const prev = records[records.length-1];
  let diff = 0;
  if(prev){
    if(exp >= prev.exp){
      // 正常累積
      diff = exp - prev.exp;
    } else {
      // 升等了：上一筆到滿等的 EXP + 這一筆的 EXP
      const prevLv = parseInt($('inputLevel').value) - 1 || 0;
      const prevLvTotal = getExpForLevel(prevLv);
      if(prevLvTotal){
        const toMax = Math.round(prevLvTotal * (100 - prev.pct) / 100);
        diff = toMax + exp;
      } else {
        diff = exp; // fallback
      }
    }
  }
  records.push({ ts: Date.now(), exp, pct, diff, src });
  updateLog();
  updateStats();
}

function updateLog(){
  if(!records.length){
    $('logBody').innerHTML = '<tr><td colspan="5" class="no-data" style="padding:14px 10px">尚無紀錄</td></tr>';
    return;
  }
  const rows = records.slice().reverse().slice(0,50).map(r=>{
    const d = new Date(r.ts);
    const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':');
    const diffStr = r.diff > 0 ? `<span class="diff-plus">+${fmt(r.diff)}</span>` : '—';
    const badge = r.src==='pixel' ? '<span class="badge ocr">像素</span>' : r.src==='ocr' ? '<span class="badge ocr">OCR</span>' : '<span class="badge manual">手動</span>';
    return `<tr>
      <td class="mono">${t}</td>
      <td class="mono">${fmt(r.exp)}</td>
      <td class="mono">${r.pct.toFixed(2)}%</td>
      <td>${diffStr}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
  $('logBody').innerHTML = rows;
}

function manualAdd(){
  const exp = parseInt($('inExp').value);
  const pct = parseFloat($('inPct').value);
  if(isNaN(exp)||isNaN(pct)) return;
  addRecord(exp, pct, 'manual');
  $('inExp').value = ''; $('inPct').value = '';
}

async function startCapture(){
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 2 }, audio: false });
    video = document.createElement('video');
    video.srcObject = stream;
    await video.play();
    running = true;
    $('btnStart').disabled = true;
    $('btnStop').disabled = false;
    $('dot').classList.add('on');
    $('statusText').textContent = '擷取中';
    $('previewWrap').style.display = 'block';
    capInterval = setInterval(doCapture, 500);
    setTimeout(doCapture, 1200);
  } catch(e) {
    alert('無法擷取螢幕：' + e.message + '\n\n請確認使用 Chrome 瀏覽器，並允許畫面分享。');
  }
}

// 楓星使用 Big Bang 前的升等 EXP 表
const EXP_TABLE = [0,15,34,57,92,135,372,560,840,1242,1716,2360,3216,4200,5460,7050,8840,11040,13716,16680,20216,24402,28980,34320,40512,47216,54900,63666,73080,83720,95700,108480,122760,138666,155540,174216,194832,216600,240500,266682,294216,324240,356916,391160,428280,468450,510420,555680,604416,655200,709716,748608,789631,832902,878545,926689,977471,1031036,1087536,1147132,1209994,1276301,1346242,1420016,1497832,1579913,1666492,1757815,1854143,1955750,2062925,2175973,2295180,2421051,2553696,2693424,2840750,2996100,3160056,3333284,3516534,3710634,3917493,4138179,4373929,4626167,4896498,5186727,5498874,5834222,6194356,6581194,6996918,7443088,7922668,8437960,8992650,9589820,10232981,10926109,11673690,12480753,13352015,14292814,15308167,16403833,17585352,18858116,20228381,21702368,23286357,24986693,26810896,28766659,30861852,33104621,35503399,38067009,40804680,43726168,46841869,51168918];

// 預設 1920x1080 座標參數，可透過校正模式調整
let calibration = {
  trackX: 0.264,   // 進度條起始 X
  trackY: 0.979,   // 進度條 Y
  trackW: 0.2943,  // 進度條軌道寬度
  trackH: 0.016,   // 進度條高度
};

function calibrate(){
  const actualPct = parseFloat(document.getElementById('calPct').value);
  const detectedPct = parseFloat(document.getElementById('calDetected').value);
  if(isNaN(actualPct) || isNaN(detectedPct) || actualPct <= 0 || detectedPct <= 0){
    alert('請先填入遊戲顯示的實際 % 和目前偵測到的 %');
    return;
  }
  // 反推：detectedPct = lastGreenCol / trackW * 100
  // actualPct = lastGreenCol / realTrackW * 100
  // 所以 realTrackW = trackW * detectedPct / actualPct
  const ratio = detectedPct / actualPct;
  calibration.trackW = Math.round(calibration.trackW * ratio * 10000) / 10000;
  document.getElementById('calResult').textContent =
    `校正完成！新 trackW = ${calibration.trackW}`;
  document.getElementById('calDetected').value = '';
  document.getElementById('calPct').value = '';
}

let captureCount = 0;

async function doCapture(){
  if(!video || !running) return;
  captureCount++;
  const vw = video.videoWidth, vh = video.videoHeight;
  if(!vw || !vh) return;

  const offscreen = document.createElement('canvas');
  offscreen.width = vw; offscreen.height = vh;
  const octx = offscreen.getContext('2d');
  octx.drawImage(video, 0, 0, vw, vh);

  // ── 1. 讀取 EXP 進度條百分比（找綠色結尾位置）──
  // 整條軌道（含灰色空白）：x: 26.4%~56%, y: 97.9%~99.5%
  const trackX = Math.floor(vw * calibration.trackX);
  const trackY = Math.floor(vh * calibration.trackY);
  const trackW = Math.floor(vw * calibration.trackW);
  const trackH = Math.floor(vh * calibration.trackH);
  const barData = octx.getImageData(trackX, trackY, trackW, trackH);
  const bd = barData.data;

  // 逐列找最後一個綠色較多的欄位
  let lastGreenCol = -1;
  for(let x = 0; x < trackW; x++){
    let colGreen = 0;
    for(let y = 0; y < trackH; y++){
      const i = (y * trackW + x) * 4;
      const r = bd[i], g = bd[i+1], b = bd[i+2];
      if(g > 80 && g > r * 1.2 && g > b * 1.2) colGreen++;
    }
    if(colGreen > trackH * 0.3) lastGreenCol = x;
  }
  const pct = lastGreenCol >= 0
    ? Math.round((lastGreenCol / (trackW - 1)) * 10000) / 100
    : 0;

  // ── 2. 偵測等級（讀取黃色 LV 數字區域）──
  // LV 數字：x: 2.75%~11.34%, y: 96%~98.5%（黃色大字）
  const lvX = Math.floor(vw * 0.0275);
  const lvY = Math.floor(vh * 0.960);
  const lvW = Math.floor(vw * 0.086);
  const lvH = Math.floor(vh * 0.025);

  const lvCvs = document.createElement('canvas');
  lvCvs.width = lvW * 3; lvCvs.height = lvH * 3;
  const lvCtx = lvCvs.getContext('2d');
  lvCtx.imageSmoothingEnabled = true;
  lvCtx.drawImage(offscreen, lvX, lvY, lvW, lvH, 0, 0, lvW*3, lvH*3);

  // 把黃色字變白、其他變黑，提高 OCR 辨識率
  const lvImg = lvCtx.getImageData(0, 0, lvCvs.width, lvCvs.height);
  const ld = lvImg.data;
  for(let i = 0; i < ld.length; i += 4){
    const r = ld[i], g = ld[i+1], b = ld[i+2];
    const isYellow = r > 150 && g > 120 && b < 100;
    const val = isYellow ? 255 : 0;
    ld[i] = ld[i+1] = ld[i+2] = val; ld[i+3] = 255;
  }
  lvCtx.putImageData(lvImg, 0, 0);

  let detectedLv = parseInt($('inputLevel').value) || 0;
  if(captureCount % 120 === 1){  // 每 60 秒偵測一次等級
    try {
    const lvRes = await Tesseract.recognize(lvCvs, 'eng', {
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '7',
    });
    const lvRaw = lvRes.data.text.replace(/\D/g, '').trim();
    const lvNum = parseInt(lvRaw);
    if(!isNaN(lvNum) && lvNum >= 1 && lvNum <= 200){
      detectedLv = lvNum;
      $('inputLevel').value = lvNum;
    }
    } catch(e) {}
  }  // end level detection

  const lv = detectedLv;
  const totalExp = getExpForLevel(lv);

  let expVal = null;
  if(totalExp && pct >= 0 && pct <= 100){
    expVal = Math.round(totalExp * pct / 100);
  }

  // ── 3. 更新預覽 ──
  const cvs = $('previewCanvas');
  cvs.width = trackW; cvs.height = trackH * 5;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(offscreen, trackX, trackY, trackW, trackH, 0, 0, trackW, trackH * 5);

  if(expVal !== null){
    $('ocrLine').textContent = `偵測到：Lv.${lv} | 進度 ${pct}% | EXP ≈ ${fmt(expVal)}`;
    addRecord(expVal, pct, 'pixel');
  } else if(pct >= 0){
    $('ocrLine').textContent = `進度 ${pct}%（請在下方設定等級以計算 EXP）`;
  } else {
    $('ocrLine').textContent = '無法偵測進度條，請確認遊戲畫面';
  }
}

function stopCapture(){
  running = false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  if(capInterval){ clearInterval(capInterval); capInterval = null; }
  $('btnStart').disabled = false;
  $('btnStop').disabled = true;
  $('dot').classList.remove('on');
  $('statusText').textContent = '已停止';
}

function resetAll(){
  if(!confirm('確定要重置所有資料嗎？')) return;
  stopCapture();
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  records = []; startTs = null;
  $('timerBig').textContent = '00:00';
  $('statusText').textContent = '尚未開始';
  $('pctLabel').textContent = '—';
  $('pctFill').style.width = '0%';
  $('previewWrap').style.display = 'none';
  $('ocrLine').textContent = '';
  updateLog(); updateStats();
}

// Enter key for manual input
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') manualAdd();
});
</script>
</body>
</html>
